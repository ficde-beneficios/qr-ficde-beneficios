<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sesión cerrada</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-logo-wrap">
            <img class="brand-logo" src="{{ url_for('static', filename='images/logo-ficde.png') }}" alt="Logo FICDE">
          </div>
          <div class="brand-copy">
            <span class="eyebrow">Sesión finalizada</span>
            <h1>Acceso cerrado</h1>
            <p>La sesión fue cerrada correctamente. Para volver a generar un QR, debes iniciar sesión nuevamente.</p>
          </div>
        </div>
      </header>

      <section class="card center">
        <div class="actions center">
          <a class="btn btn-primary" href="{{ url_for('login_demo') }}">Volver a ingresar</a>
        </div>
      </section>

      <div class="footer-note">
        Uso exclusivo para validación temporal de beneficios FICDE.
      </div>
    </div>
  </div>
</body>
</html>
