<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-logo-wrap">
            <img class="brand-logo" src="{{ url_for('static', filename='images/logo-ficde.png') }}" alt="Logo FICDE">
          </div>
          <div class="brand-copy">
            <span class="eyebrow">Estado del acceso</span>
            <h1>{{ title }}</h1>
            <p>Se produjo una restricción en el acceso o en la generación del código temporal.</p>
          </div>
        </div>
      </header>

      <section class="card">
        <div class="status-box status-error">
          <div class="status-icon">!</div>
          <h2 class="status-title">{{ title }}</h2>
          <p class="status-message">{{ message }}</p>
        </div>

        <div class="actions spacer-lg">
          <a class="btn btn-primary" href="{{ url_for('login_demo') }}">Volver al acceso</a>
        </div>
      </section>

      <div class="footer-note">
        Uso exclusivo para validación temporal de beneficios FICDE.
      </div>
    </div>
  </div>
</body>
</html>
